<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SpendSense Transactions</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            background: #f7f7f7;
            color: #222;
        }

        h1 {
            margin-bottom: 16px;
        }

        .filters {
            background: white;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .filters form {
            display: flex;
            gap: 12px;
            align-items: end;
            flex-wrap: wrap;
        }

        .filters label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .filters input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-width: 180px;
        }

        .filters button,
        .filters a {
            padding: 9px 14px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .filters button {
            background: #222;
            color: white;
        }

        .filters a {
            background: #e9e9e9;
            color: #222;
        }

        .table-wrap {
            background: white;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid #e5e5e5;
            vertical-align: top;
        }

        th {
            background: #fafafa;
        }

        .amount {
            text-align: right;
            white-space: nowrap;
        }

        .muted {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .empty {
            padding: 20px;
            color: #666;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-success {
            background: #e8f7ee;
            color: #166534;
            border: 1px solid #b7e4c7;
        }

        .alert-warning {
            background: #fff7e6;
            color: #92400e;
            border: 1px solid #f5d08a;
        }

        .alert-error {
            background: #fdecec;
            color: #991b1b;
            border: 1px solid #f5b5b5;
        }

        .import-box {
            background: white;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .import-box form {
            display: flex;
            gap: 12px;
            align-items: end;
            flex-wrap: wrap;
        }

        .import-box label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .import-box input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .import-box button {
            padding: 9px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>
<h1>SpendSense Transactions</h1>
<div class="alert alert-success" th:if="${importSuccess}" th:text="${importSuccess}"></div>
<div class="alert alert-warning" th:if="${importWarning}" th:text="${importWarning}"></div>
<div class="alert alert-error" th:if="${importError}" th:text="${importError}"></div>

<div class="import-box">
    <form method="post" action="/transactions/import/cibc-pdf" enctype="multipart/form-data">
        <div>
            <label for="file">Import CIBC PDF Statement</label>
            <input id="file" name="file" type="file" accept="application/pdf" required>
        </div>

        <button type="submit">Import PDF</button>
    </form>
</div>
<div class="filters">
    <form method="get" action="/transactions/view">
        <div>
            <label for="cardRef">Card Ref</label>
            <input id="cardRef" name="cardRef" type="text" placeholder="7516 or 9097"
                   th:value="${selectedCardRef}">
        </div>

        <div>
            <label for="postedMonth">Posted Month</label>
            <input id="postedMonth" name="postedMonth" type="text"
                    placeholder="2026-05"
                    th:value="${selectedPostedMonth}">
        </div>

        <button type="submit">Apply Filters</button>
        <a href="/transactions/view">Clear</a>
    </form>
</div>

<div class="table-wrap">
    <div class="muted">
        <span th:text="'Rows: ' + ${rowCount}"></span>
        <span style="margin-left: 20px;" th:text="'Total: $' + ${#numbers.formatDecimal(totalAmount, 1, 2)}"></span>
    </div>

    <table th:if="${!#lists.isEmpty(transactions)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Posted Date</th>
            <th>Trans Date</th>
            <th>Description</th>
            <th>Bank Category</th>
            <th>Card Ref</th>
            <th>Currency</th>
            <th class="amount">Amount</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tx : ${transactions}">
            <td th:text="${tx.id}"></td>
            <td th:text="${tx.postedDate}"></td>
            <td th:text="${tx.transDate}"></td>
            <td th:text="${tx.description}"></td>
            <td th:text="${tx.bankCategory}"></td>
            <td th:text="${tx.cardRef}"></td>
            <td th:text="${tx.currency}"></td>
            <td class="amount" th:text="${#numbers.formatDecimal(tx.amountCents / 100.0, 1, 2)}"></td>
        </tr>
        </tbody>
    </table>

    <div class="empty" th:if="${#lists.isEmpty(transactions)}">
        No transactions found.
    </div>
</div>
</body>
</html>
